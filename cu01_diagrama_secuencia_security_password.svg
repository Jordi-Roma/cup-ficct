<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1450" viewBox="0 0 1500 1450">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#111"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #111; }
      .head { font: 700 18px Arial, sans-serif; fill: #111; }
      .text { font: 15px Arial, sans-serif; fill: #111; }
      .small { font: 13px Arial, sans-serif; fill: #111; }
      .label { font: 700 14px Arial, sans-serif; fill: #111; }
      .line { stroke: #111; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .return { stroke: #555; stroke-width: 2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow-gray); }
      .life { stroke: #777; stroke-width: 1.5; stroke-dasharray: 7 6; }
      .box { fill: #fff; stroke: #111; stroke-width: 1.8; }
      .block { fill: rgba(248,250,252,0.86); stroke: #111; stroke-width: 1.6; }
      .section { stroke: #999; stroke-width: 1.1; stroke-dasharray: 5 5; }
    </style>
  </defs>

  <rect x="0" y="0" width="1500" height="1450" fill="#fff"/>
  <text x="750" y="45" text-anchor="middle" class="title">CU01 - Diagrama de secuencia: Seguridad y contrasena</text>

  <!-- Participants -->
  <rect x="45" y="75" width="150" height="48" rx="4" class="box"/>
  <text x="120" y="105" text-anchor="middle" class="head">Usuario</text>

  <rect x="305" y="75" width="170" height="48" rx="4" class="box"/>
  <text x="390" y="105" text-anchor="middle" class="head">UI SessionPage</text>

  <rect x="600" y="75" width="210" height="58" rx="4" class="box"/>
  <text x="705" y="99" text-anchor="middle" class="head">Security/Password</text>
  <text x="705" y="119" text-anchor="middle" class="head">Controller</text>

  <rect x="980" y="75" width="170" height="48" rx="4" class="box"/>
  <text x="1065" y="105" text-anchor="middle" class="head">usuario</text>

  <rect x="1235" y="75" width="170" height="48" rx="4" class="box"/>
  <text x="1320" y="105" text-anchor="middle" class="head">session</text>

  <!-- Lifelines -->
  <line x1="120" y1="123" x2="120" y2="1390" class="life"/>
  <line x1="390" y1="123" x2="390" y2="1390" class="life"/>
  <line x1="705" y1="133" x2="705" y2="1390" class="life"/>
  <line x1="1065" y1="123" x2="1065" y2="1390" class="life"/>
  <line x1="1320" y1="123" x2="1320" y2="1390" class="life"/>

  <!-- 1. Login -->
  <rect x="30" y="155" width="1390" height="420" rx="4" class="block"/>
  <rect x="30" y="155" width="145" height="30" class="box"/>
  <text x="50" y="176" class="label">loop</text>
  <text x="190" y="176" class="small">Hasta ingresar credenciales validas o cancelar</text>

  <line x1="120" y1="220" x2="390" y2="220" class="line"/>
  <text x="160" y="212" class="text">1. Iniciar sesion</text>

  <line x1="390" y1="255" x2="705" y2="255" class="line"/>
  <text x="465" y="247" class="text">1.1 store(username, pwd)</text>

  <line x1="705" y1="295" x2="1065" y2="295" class="line"/>
  <text x="815" y="287" class="text">1.1.1 update(pwd)</text>
  <line x1="1065" y1="325" x2="705" y2="325" class="return"/>
  <text x="815" y="318" class="text">Usuario validado</text>

  <rect x="60" y="350" width="1340" height="205" rx="4" class="block"/>
  <rect x="60" y="350" width="110" height="28" class="box"/>
  <text x="80" y="370" class="label">alt</text>
  <text x="185" y="370" class="small">Resultado de autenticacion</text>
  <line x1="60" y1="425" x2="1400" y2="425" class="section"/>
  <line x1="60" y1="495" x2="1400" y2="495" class="section"/>

  <text x="80" y="405" class="label">Credenciales validas</text>
  <line x1="705" y1="405" x2="1320" y2="405" class="line"/>
  <text x="920" y="397" class="text">Crear sesion</text>
  <line x1="1320" y1="440" x2="705" y2="440" class="return"/>
  <text x="920" y="433" class="text">Sesion iniciada</text>
  <line x1="705" y1="465" x2="390" y2="465" class="return"/>
  <text x="430" y="458" class="text">Retornar acceso autorizado</text>
  <line x1="390" y1="485" x2="120" y2="485" class="return"/>
  <text x="150" y="478" class="text">Mostrar pantalla principal</text>

  <text x="80" y="475" class="label">Credenciales invalidas</text>
  <line x1="705" y1="518" x2="390" y2="518" class="return"/>
  <text x="430" y="511" class="text">Mostrar error de autenticacion</text>

  <text x="80" y="535" class="label">Datos incompletos</text>
  <line x1="705" y1="545" x2="390" y2="545" class="return"/>
  <text x="430" y="538" class="text">Solicitar usuario y contrasena</text>

  <!-- 2. Logout -->
  <rect x="30" y="610" width="1390" height="190" rx="4" class="block"/>
  <rect x="30" y="610" width="115" height="30" class="box"/>
  <text x="51" y="631" class="label">opt</text>
  <text x="160" y="631" class="small">Usuario decide cerrar sesion</text>

  <line x1="120" y1="675" x2="390" y2="675" class="line"/>
  <text x="160" y="667" class="text">2. Cerrar sesion</text>
  <line x1="390" y1="710" x2="705" y2="710" class="line"/>
  <text x="480" y="702" class="text">2.1 logout()</text>
  <line x1="705" y1="745" x2="1065" y2="745" class="line"/>
  <text x="815" y="737" class="text">2.1.1 logout()</text>
  <line x1="705" y1="770" x2="1320" y2="770" class="line"/>
  <text x="940" y="762" class="text">Finalizar sesion</text>
  <line x1="1320" y1="790" x2="705" y2="790" class="return"/>
  <text x="920" y="783" class="text">Sesion cerrada</text>

  <!-- 3. Request reset -->
  <rect x="30" y="840" width="1390" height="285" rx="4" class="block"/>
  <rect x="30" y="840" width="145" height="30" class="box"/>
  <text x="50" y="861" class="label">loop</text>
  <text x="190" y="861" class="small">Hasta ingresar identificador valido o cancelar</text>

  <line x1="120" y1="905" x2="390" y2="905" class="line"/>
  <text x="145" y="897" class="text">3. Recuperar contrasena</text>
  <line x1="390" y1="940" x2="705" y2="940" class="line"/>
  <text x="465" y="932" class="text">3.1 requestReset(iden)</text>
  <line x1="705" y1="975" x2="1320" y2="975" class="line"/>
  <text x="925" y="967" class="text">3.1.1 requestReset()</text>

  <rect x="60" y="1000" width="1340" height="105" rx="4" class="block"/>
  <rect x="60" y="1000" width="110" height="28" class="box"/>
  <text x="80" y="1020" class="label">alt</text>
  <line x1="60" y1="1055" x2="1400" y2="1055" class="section"/>
  <text x="80" y="1048" class="label">Identificador registrado</text>
  <line x1="1320" y1="1045" x2="705" y2="1045" class="return"/>
  <text x="910" y="1038" class="text">Token/enlace generado</text>
  <line x1="705" y1="1075" x2="390" y2="1075" class="return"/>
  <text x="430" y="1068" class="text">Confirmar envio de recuperacion</text>
  <text x="80" y="1090" class="label">Identificador no registrado</text>
  <line x1="705" y1="1095" x2="390" y2="1095" class="return"/>
  <text x="430" y="1088" class="text">Mostrar error o mensaje informativo</text>

  <!-- 4. Reset password -->
  <rect x="30" y="1160" width="1390" height="260" rx="4" class="block"/>
  <rect x="30" y="1160" width="115" height="30" class="box"/>
  <text x="51" y="1181" class="label">opt</text>
  <text x="160" y="1181" class="small">Usuario accede al enlace o codigo de recuperacion</text>

  <line x1="120" y1="1225" x2="390" y2="1225" class="line"/>
  <text x="135" y="1217" class="text">4. Reestablecer contrasena</text>
  <line x1="390" y1="1260" x2="705" y2="1260" class="line"/>
  <text x="455" y="1252" class="text">4.1 resetPassword(data)</text>
  <line x1="705" y1="1295" x2="1320" y2="1295" class="line"/>
  <text x="920" y="1287" class="text">4.1.1 resetPassword()</text>

  <rect x="60" y="1320" width="1340" height="90" rx="4" class="block"/>
  <rect x="60" y="1320" width="110" height="28" class="box"/>
  <text x="80" y="1340" class="label">alt</text>
  <line x1="60" y1="1370" x2="1400" y2="1370" class="section"/>
  <text x="80" y="1362" class="label">Token valido y nueva contrasena valida</text>
  <line x1="1320" y1="1360" x2="705" y2="1360" class="return"/>
  <text x="905" y="1353" class="text">Contrasena actualizada</text>
  <line x1="705" y1="1388" x2="390" y2="1388" class="return"/>
  <text x="430" y="1381" class="text">Mostrar mensaje de exito</text>
  <text x="80" y="1398" class="label">Token invalido/expirado o contrasena invalida</text>
  <line x1="705" y1="1405" x2="390" y2="1405" class="return"/>
  <text x="430" y="1398" class="text">Mostrar error y solicitar correccion</text>
</svg>
